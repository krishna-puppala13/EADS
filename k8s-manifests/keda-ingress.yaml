apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keda-http-ingress
  namespace: keda
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keda-add-ons-http-interceptor-proxy
                port:
                  number: 8080